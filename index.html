<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일직동 실거래가 알림이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div class="max-w-lg mx-auto bg-white min-h-screen shadow-lg">
        <div class="bg-slate-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold italic">광명역 아파트 실거래가</h1>
            <p class="text-slate-400 text-sm mt-1 font-bold">조회기간과 단지 및 면적을 선택한 후, 조회 버튼을 눌러주세요</p>
        </div>

        <div class="p-4 space-y-3 border-b sticky top-0 bg-white z-10 shadow-sm">
            <div class="grid grid-cols-2 gap-2">
                <input type="month" id="startYm" class="p-2 border rounded-lg text-sm">
                <input type="month" id="endYm" class="p-2 border rounded-lg text-sm">
            </div>
            <select id="selectedApt" class="w-full p-2 border rounded-lg text-sm bg-gray-50">
                <option value="전체 단지">전체 단지</option>
                <option value="광명역써밋플레이스">광명역써밋플레이스</option>
                <option value="유-플래닛태영데시앙">유-플래닛태영데시앙</option>
                <option value="광명역푸르지오">광명역푸르지오</option>
                <option value="광명역파크자이">광명역파크자이</option>
                <option value="광명역센트럴자이">광명역센트럴자이</option>
            </select>
            <select id="selectedArea" class="w-full p-2 border rounded-lg text-sm bg-gray-50">
                <option value="전체 면적">전체 면적</option>
                <option value="59형(26평)">59형(26평)</option>
                <option value="84형(34평)">84형(34평)</option>
            </select>
            <button onclick="fetchAllData()" id="btnFetch" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold active:bg-blue-800 transition-colors shadow-md">
                조회하기
            </button>
        </div>

        <div id="resultList" class="p-4 space-y-3">
            <div class="text-center text-gray-400 mt-20">
                <p>구글 서버를 통해 데이터를 안전하게 불러옵니다.</p>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxXwDlYOijFq3hwzcBF1_tux6vJ9nOE8XkuDN7BcR9nnlB6G60qulofGaQI-YdLwYxMig/exec";

        // --- 추가된 부분: 페이지 로드 시 '저번 달'을 기본값으로 설정 ---
        window.onload = function() {
            const now = new Date();
            // 현재 날짜에서 한 달을 뺌
            now.setMonth(now.getMonth() - 1);
            
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const lastMonth = `${year}-${month}`;

            document.getElementById('startYm').value = lastMonth;
            document.getElementById('endYm').value = lastMonth;
        };

        async function fetchAllData() {
            const startYm = document.getElementById('startYm').value.replace("-", "");
            const endYm = document.getElementById('endYm').value.replace("-", "");
            const selectedApt = document.getElementById('selectedApt').value;
            const selectedArea = document.getElementById('selectedArea').value;
            const resultDiv = document.getElementById('resultList');
            const btn = document.getElementById('btnFetch');

            if (!GAS_URL || GAS_URL.includes("여기에")) {
                alert("GAS 웹 앱 URL을 설정해주세요.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "서버 연결 중...";
            resultDiv.innerHTML = '<div class="text-center py-10"><p class="animate-bounce">🚀 구글 서버에서 데이터를 가져오는 중...</p></div>';

            try {
                const response = await fetch(`${GAS_URL}?startYm=${startYm}&endYm=${endYm}`);
                const data = await response.json();

                const filteredData = data.filter(d => {
                    const matchApt = selectedApt === "전체 단지" ? true : d.aptNm.includes(selectedApt.replace("광명역","").replace("유-플래닛","").replace("태영","").trim());
                    const matchArea = selectedArea === "전체 면적" ? true : d.area === selectedArea;
                    return matchApt && matchArea;
                });

                renderData(filteredData);
            } catch (e) {
                console.error(e);
                resultDiv.innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-lg text-sm text-center font-bold">서버 연결에 실패했습니다.<br>배포 설정(액세스 권한: 모든 사용자)을 확인해주세요.</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "조회하기";
            }
        }
function renderData(data) {
    const resultDiv = document.getElementById('resultList');
    if (!data || data.length === 0) {
        resultDiv.innerHTML = '<p class="text-center py-10 text-gray-400">조건에 맞는 데이터가 없습니다.</p>';
        return;
    }

    let html = `<p class="text-xs text-gray-400 mb-2 font-bold">총 ${data.length}건의 거래 발견</p>`;
    
    data.forEach(d => {
        // --- 최고가 표시 로직 추가 ---
        // 1. 신고가인 경우 (isMax가 true) 빨간색 뱃지와 연한 빨강 배경 적용
        const maxBadge = d.isMax ? '<span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-2 animate-pulse">신고가</span>' : '';
        const cardBg = d.isMax ? 'bg-red-50/50 border-red-200' : 'bg-white border-gray-200';
        
        // 2. 이전 최고가 정보 텍스트 생성 (신고가일 때만 보여주거나 항상 작게 표시 가능)
        let prevMaxInfo = "";
        if (d.isMax && d.prevMax !== "0.00억") {
            prevMaxInfo = `<p class="text-[10px] text-red-400 line-through">기존 최고 ${d.prevMax} (${d.prevDate})</p>`;
        }

        html += `
        <div class="${cardBg} border rounded-xl p-4 shadow-sm mb-3">
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="font-bold text-slate-800 text-lg flex items-center">
                        ${d.aptNm} ${maxBadge}
                    </h3>
                    <p class="text-xs text-gray-400 mt-0.5">${d.date} 거래</p>
                </div>
                <span class="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded-md font-bold">${d.floor}층</span>
            </div>
            
            <div class="flex justify-between mt-4 items-end">
                <div class="text-sm text-gray-500 font-medium">
                    ${d.area}
                </div>
                <div class="text-right">
                    ${prevMaxInfo} 
                    <div class="text-2xl font-black text-blue-600">${d.price}</div>
                </div>
            </div>
        </div>`;
    });
    
    resultDiv.innerHTML = html;
}

    </script>
</body>
</html>
