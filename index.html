<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일직동 실거래가 알림이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        input[type="month"] { color: #1e293b !important; min-height: 3rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">
    <div class="max-w-lg mx-auto bg-white min-h-screen shadow-lg">
        <div class="bg-slate-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold italic">광명역 아파트 실거래가</h1>
            <p class="text-slate-400 text-sm mt-1 font-bold">조회기간과 단지 및 면적을 선택해 주세요</p>
        </div>

        <div class="p-4 space-y-3 border-b sticky top-0 bg-white z-20 shadow-sm">
            <div class="grid grid-cols-2 gap-2">
                <input type="month" id="startYm" class="p-3 border-2 border-slate-100 rounded-xl text-sm font-bold">
                <input type="month" id="endYm" class="p-3 border-2 border-slate-100 rounded-xl text-sm font-bold">
            </div>
            <select id="selectedApt" class="w-full p-3 border-2 border-slate-50 rounded-xl text-sm bg-gray-50">
                <option value="전체 단지">전체 단지</option>
                <option value="광명역써밋플레이스">광명역써밋플레이스</option>
                <option value="유-플래닛태영데시앙">유-플래닛태영데시앙</option>
                <option value="광명역푸르지오">광명역푸르지오</option>
                <option value="광명역파크자이">광명역파크자이</option>
                <option value="광명역센트럴자이">광명역센트럴자이</option>
            </select>
            <select id="selectedArea" class="w-full p-3 border-2 border-slate-50 rounded-xl text-sm bg-gray-50">
                <option value="전체 면적">전체 면적</option>
                <option value="59형(26평)">59형(26평)</option>
                <option value="84형(34평)">84형(34평)</option>
            </select>
            <button onclick="fetchAllData()" id="btnFetch" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">조회하기</button>
            
            <div id="sortContainer" class="hidden flex gap-2 pt-2">
                <button onclick="sortData('date')" id="sortDateBtn" class="flex-1 py-2 rounded-lg text-[11px] font-bold bg-blue-600 text-white">🗓 최신순</button>
                <button onclick="sortData('price')" id="sortPriceBtn" class="flex-1 py-2 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-600">💰 금액순</button>
            </div>
        </div>

        <div id="resultList" class="p-4 space-y-3">
            <div class="text-center text-gray-400 mt-20"><p>데이터를 불러오려면 조회 버튼을 눌러주세요.</p></div>
        </div>
    </div>

    <script>
        const GAS_URL ="https://script.google.com/macros/s/AKfycbzVPL3ZKT42YZRkRLHK1K6htwYnPkhXM4jrazdjPOgIrC5IEUmO5KsNYi0NUsVM1aA4ig/exec";
        let currentData = [];

        window.onload = function() {
            const now = new Date();
            now.setMonth(now.getMonth() - 1);
            const lastMonth = `${now.getFullYear()}-${(now.getMonth() + 1).toString().padStart(2, '0')}`;
            document.getElementById('startYm').value = lastMonth;
            document.getElementById('endYm').value = lastMonth;
        };

        async function fetchAllData() {
            const startYm = document.getElementById('startYm').value.replace("-", "");
            const endYm = document.getElementById('endYm').value.replace("-", "");
            const selectedApt = document.getElementById('selectedApt').value;
            const selectedArea = document.getElementById('selectedArea').value;
            const btn = document.getElementById('btnFetch');
            const resultDiv = document.getElementById('resultList');

            btn.disabled = true; btn.innerText = "서버 연결 중...";
            resultDiv.innerHTML = '<div class="text-center py-10 animate-pulse">🚀 데이터를 가져오고 있습니다...</div>';

            try {
                const response = await fetch(`${GAS_URL}?startYm=${startYm}&endYm=${endYm}`);
                const data = await response.json();

                currentData = data.filter(d => {
                    const matchApt = selectedApt === "전체 단지" ? true : d.aptNm === selectedApt;
                    const matchArea = selectedArea === "전체 면적" ? true : d.area === selectedArea;
                    return matchApt && matchArea;
                });

                document.getElementById('sortContainer').classList.remove('hidden');
                sortData('date'); 
            } catch (e) {
                resultDiv.innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-xl text-center font-bold">서버 연결 실패<br><span class="text-xs font-normal">GAS 배포 설정(모든 사용자)을 확인하세요.</span></div>`;
            } finally {
                btn.disabled = false; btn.innerText = "조회하기";
            }
        }

        function sortData(type) {
            const dateBtn = document.getElementById('sortDateBtn');
            const priceBtn = document.getElementById('sortPriceBtn');
            
            if (type === 'date') {
                currentData.sort((a, b) => new Date(b.date) - new Date(a.date));
                dateBtn.className = "flex-1 py-2 rounded-lg text-[11px] font-bold bg-blue-600 text-white";
                priceBtn.className = "flex-1 py-2 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-600";
            } else {
                currentData.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
                priceBtn.className = "flex-1 py-2 rounded-lg text-[11px] font-bold bg-blue-600 text-white";
                dateBtn.className = "flex-1 py-2 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-600";
            }
            renderData(currentData);
        }

        function renderData(data) {
            const resultDiv = document.getElementById('resultList');
            if (data.length === 0) { resultDiv.innerHTML = '<p class="text-center py-10 text-gray-400">거래 데이터가 없습니다.</p>'; return; }

            let html = `<p class="text-[10px] text-gray-400 mb-2 font-bold">총 ${data.length}건 발견</p>`;
            data.forEach(d => {
                const isNewMax = d.isMax;
                const ratio = ((parseFloat(d.price) / parseFloat(d.prevMax)) * 100).toFixed(1);
                const ratioColor = ratio >= 100 ? 'text-red-500 font-bold' : (ratio >= 95 ? 'text-orange-500' : 'text-gray-400');
                const maxTag = isNewMax ? `<span class="bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded ml-2 border border-amber-300 animate-bounce">👑 역대 신고가</span>` : '';

                html += `
                <div class="bg-white border rounded-2xl p-4 shadow-sm mb-3">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center"><h3 class="font-bold text-slate-800">${d.aptNm}</h3>${maxTag}</div>
                        <span class="text-slate-400 text-[10px] font-bold">${d.date}</span>
                    </div>
                    <div class="flex justify-between mt-4 items-end">
                        <div class="text-xs text-gray-400">${d.area} / ${d.floor}층</div>
                        <div class="text-right">
                            <div class="text-[10px] text-gray-400 mb-1">직전 최고: ${d.prevMax} (${d.prevDate}) <span class="${ratioColor}">[${ratio}%]</span></div>
                            <div class="text-xl font-extrabold text-blue-600">${d.price}</div>
                        </div>
                    </div>
                </div>`;
            });
            resultDiv.innerHTML = html;
        }
    </script>
</body>
</html>
