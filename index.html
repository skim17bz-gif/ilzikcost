<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일직동 실거래가 알림이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div class="max-w-lg mx-auto bg-white min-h-screen shadow-lg">
        <div class="bg-slate-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold italic">광명역 아파트 실거래가</h1>
            <p class="text-slate-400 text-sm mt-1 font-bold">조회기간과 단지 및 면적을 선택한 후, 조회 버튼을 눌러주세요</p>
        </div>

        <div class="p-4 space-y-3 border-b sticky top-0 bg-white z-20 shadow-sm">
            <div class="grid grid-cols-2 gap-2">
                <input type="month" id="startYm" class="p-2 border rounded-lg text-sm">
                <input type="month" id="endYm" class="p-2 border rounded-lg text-sm">
            </div>
            <select id="selectedApt" class="w-full p-2 border rounded-lg text-sm bg-gray-50">
                <option value="전체 단지">전체 단지</option>
                <option value="광명역써밋플레이스">광명역써밋플레이스</option>
                <option value="유-플래닛태영데시앙">유-플래닛태영데시앙</option>
                <option value="광명역푸르지오">광명역푸르지오</option>
                <option value="광명역파크자이">광명역파크자이</option>
                <option value="광명역센트럴자이">광명역센트럴자이</option>
            </select>
            <select id="selectedArea" class="w-full p-2 border rounded-lg text-sm bg-gray-50">
                <option value="전체 면적">전체 면적</option>
                <option value="59형(26평)">59형(26평)</option>
                <option value="84형(34평)">84형(34평)</option>
            </select>
            <button onclick="fetchAllData()" id="btnFetch" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold active:bg-blue-800 transition-colors shadow-md">
                조회하기
            </button>
        </div>

        <div id="sortContainer" class="hidden flex gap-2 p-4 pb-0">
            <button onclick="sortData('date')" id="sortDateBtn" class="flex-1 py-2 rounded-lg text-xs font-bold bg-slate-100 text-slate-600 border border-slate-200">
                🗓 거래일자순 (최신)
            </button>
            <button onclick="sortData('price')" id="sortPriceBtn" class="flex-1 py-2 rounded-lg text-xs font-bold bg-slate-100 text-slate-600 border border-slate-200">
                💰 금액순 (높은순)
            </button>
        </div>

        <div id="resultList" class="p-4 space-y-3">
            <div class="text-center text-gray-400 mt-20">
                <p>구글 서버를 통해 데이터를 안전하게 불러옵니다.</p>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyjZIkJA0mbMDH3AKrocAmwSAOsoAwajuU-5ItPoADNk1DHzHAuHCajIltNP0GZle0Tyw/exec";
        let currentData = []; // 서버에서 받아온 원본 데이터를 저장할 변수

        window.onload = function() {
            const now = new Date();
            now.setMonth(now.getMonth() - 1);
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const lastMonth = `${year}-${month}`;
            document.getElementById('startYm').value = lastMonth;
            document.getElementById('endYm').value = lastMonth;
        };

        async function fetchAllData() {
            const startYm = document.getElementById('startYm').value.replace("-", "");
            const endYm = document.getElementById('endYm').value.replace("-", "");
            const selectedApt = document.getElementById('selectedApt').value;
            const selectedArea = document.getElementById('selectedArea').value;
            const resultDiv = document.getElementById('resultList');
            const btn = document.getElementById('btnFetch');
            const sortContainer = document.getElementById('sortContainer');

            if (!GAS_URL || GAS_URL.includes("여기에")) {
                alert("GAS 웹 앱 URL을 설정해주세요.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "서버 연결 중...";
            sortContainer.classList.add('hidden');
            resultDiv.innerHTML = '<div class="text-center py-10"><p class="animate-bounce">🚀 데이터를 가져오는 중...</p></div>';

            try {
                const response = await fetch(`${GAS_URL}?startYm=${startYm}&endYm=${endYm}`);
                const data = await response.json();

                // 필터링 적용
                currentData = data.filter(d => {
                    const matchApt = selectedApt === "전체 단지" ? true : d.aptNm.includes(selectedApt.replace("광명역","").replace("유-플래닛","").replace("태영","").trim());
                    const matchArea = selectedArea === "전체 면적" ? true : d.area === selectedArea;
                    return matchApt && matchArea;
                });

                if (currentData.length > 0) {
                    sortContainer.classList.remove('hidden');
                    sortData('date'); // 기본적으로 날짜순 정렬
                } else {
                    renderData(currentData);
                }
            } catch (e) {
                console.error(e);
                resultDiv.innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-lg text-sm text-center font-bold">서버 연결에 실패했습니다.</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "조회하기";
            }
        }

        // 정렬 기능 함수
        function sortData(type) {
            const dateBtn = document.getElementById('sortDateBtn');
            const priceBtn = document.getElementById('sortPriceBtn');

            // 버튼 스타일 초기화
            [dateBtn, priceBtn].forEach(b => {
                b.classList.replace('bg-blue-600', 'bg-slate-100');
                b.classList.replace('text-white', 'text-slate-600');
            });

            if (type === 'date') {
                // 날짜 최신순 정렬
                currentData.sort((a, b) => new Date(b.date) - new Date(a.date));
                dateBtn.classList.replace('bg-slate-100', 'bg-blue-600');
                dateBtn.classList.replace('text-slate-600', 'text-white');
            } else if (type === 'price') {
                // 금액 높은순 정렬
                currentData.sort((a, b) => {
                    const priceA = parseFloat(a.price.replace('억', ''));
                    const priceB = parseFloat(b.price.replace('억', ''));
                    return priceB - priceA;
                });
                priceBtn.classList.replace('bg-slate-100', 'bg-blue-600');
                priceBtn.classList.replace('text-slate-600', 'text-white');
            }
            renderData(currentData);
        }

        function renderData(data) {
            const resultDiv = document.getElementById('resultList');
            if (!data || data.length === 0) {
                resultDiv.innerHTML = '<p class="text-center py-10 text-gray-400">조건에 맞는 데이터가 없습니다.</p>';
                return;
            }

            let html = `<p class="text-[10px] text-gray-400 mb-1 font-bold">총 ${data.length}건의 거래 발견</p>`;
            data.forEach(d => {
                html += `
                <div class="bg-white border rounded-xl p-4 shadow-sm mb-3 active:bg-gray-50 transition-colors">
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-slate-800 text-base">${d.aptNm}</h3>
                        <span class="bg-slate-100 text-slate-500 text-[10px] px-2 py-1 rounded-md font-bold">${d.date}</span>
                    </div>
                    <div class="flex justify-between mt-3 items-end">
                        <div class="text-xs text-gray-500">${d.area} / ${d.floor}층</div>
                        <div class="text-lg font-extrabold text-blue-600">${d.price}</div>
                    </div>
                </div>`;
            });
            resultDiv.innerHTML = html;
        }
    </script>
</body>
</html>
