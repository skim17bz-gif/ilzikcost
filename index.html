<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일직동 실거래가 알림이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        
        /* 날짜 입력창을 버튼처럼 보이게 수정 */
        .date-input-wrapper {
            position: relative;
            width: 100%;
        }
        
        input[type="month"] {
            width: 100%;
            height: 3.5rem;
            padding: 0 1rem;
            text-align: center;
            background-color: #ffffff;
            border: 2px solid #f1f5f9;
            border-radius: 0.75rem;
            font-weight: 700;
            color: #1e293b;
            cursor: pointer;
            display: block;
            appearance: none;
            -webkit-appearance: none;
        }

        /* 캘린더 아이콘 강제 삽입 (버튼처럼 보이게 함) */
        input[type="month"]::-webkit-calendar-picker-indicator {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            cursor: pointer;
            opacity: 0.6; /* 아이콘을 보이게 설정 */
        }

        /* 호버 시 테두리 색상 변경 */
        input[type="month"]:hover {
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">
    <div class="max-w-lg mx-auto bg-white min-h-screen shadow-lg">
        <div class="bg-slate-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold italic">광명역 아파트 실거래가</h1>
            <p class="text-slate-400 text-sm mt-1 font-bold">조회기간과 단지 및 면적을 선택해 주세요</p>
        </div>

        <div class="p-4 space-y-4 border-b sticky top-0 bg-white z-20 shadow-sm">
            <div class="grid grid-cols-2 gap-3">
                <div class="date-input-wrapper">
                    <span class="text-[10px] text-slate-500 font-bold mb-1 block text-center">시작월</span>
                    <input type="month" id="startYm" onclick="this.showPicker()">
                </div>
                <div class="date-input-wrapper">
                    <span class="text-[10px] text-slate-500 font-bold mb-1 block text-center">종료월</span>
                    <input type="month" id="endYm" onclick="this.showPicker()">
                </div>
            </div>
            
            <select id="selectedApt" class="w-full h-12 px-3 border-2 border-slate-50 rounded-xl text-sm bg-gray-50 font-bold text-center appearance-none">
                <option value="전체 단지">전체 단지</option>
                <option value="광명역써밋플레이스">광명역써밋플레이스</option>
                <option value="유-플래닛태영데시앙">유-플래닛태영데시앙</option>
                <option value="광명역푸르지오">광명역푸르지오</option>
                <option value="광명역파크자이">광명역파크자이</option>
                <option value="광명역센트럴자이">광명역센트럴자이</option>
            </select>

            <select id="selectedArea" class="w-full h-12 px-3 border-2 border-slate-50 rounded-xl text-sm bg-gray-50 font-bold text-center appearance-none">
                <option value="전체 면적">전체 면적</option>
                <option value="59형(26평)">59형(26평)</option>
                <option value="84형(34평)">84형(34평)</option>
            </select>

            <button onclick="fetchAllData()" id="btnFetch" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform text-lg">
                조회하기
            </button>
            
            <div id="sortContainer" class="hidden flex gap-2">
                <button onclick="sortData('date')" id="sortDateBtn" class="flex-1 py-2 rounded-lg text-[11px] font-bold bg-blue-600 text-white shadow-sm">🗓 최신순</button>
                <button onclick="sortData('price')" id="sortPriceBtn" class="flex-1 py-2 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-600 border border-slate-200 shadow-sm">💰 금액순</button>
            </div>
        </div>

        <div id="resultList" class="p-4 space-y-3">
            <div class="text-center text-gray-400 mt-20"><p>데이터를 불러오려면 조회 버튼을 눌러주세요.</p></div>
        </div>
    </div>

    <script>
        // GAS_URL은 본인의 것으로 유지하세요
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyjZIkJA0mbMDH3AKrocAmwSAOsoAwajuU-5ItPoADNk1DHzHAuHCajIltNP0GZle0Tyw/exec";
        let currentData = [];

        window.onload = function() {
            const now = new Date();
            const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1);
            const formatted = `${lastMonth.getFullYear()}-${(lastMonth.getMonth() + 1).toString().padStart(2, '0')}`;
            document.getElementById('startYm').value = formatted;
            document.getElementById('endYm').value = formatted;
        };

        async function fetchAllData() {
            const startYm = document.getElementById('startYm').value.replace("-", "");
            const endYm = document.getElementById('endYm').value.replace("-", "");
            const selectedApt = document.getElementById('selectedApt').value;
            const selectedArea = document.getElementById('selectedArea').value;
            const btn = document.getElementById('btnFetch');
            const resultDiv = document.getElementById('resultList');

            if (!startYm || !endYm) { alert("연월을 선택해 주세요."); return; }

            btn.disabled = true; btn.innerText = "조회 중...";
            resultDiv.innerHTML = '<div class="text-center py-10 animate-pulse">🚀 데이터를 분석하고 있습니다...</div>';

            try {
                const response = await fetch(`${GAS_URL}?startYm=${startYm}&endYm=${endYm}`);
                const data = await response.json();

                currentData = data.filter(d => {
                    const matchApt = selectedApt === "전체 단지" ? true : d.aptNm === selectedApt;
                    const matchArea = selectedArea === "전체 면적" ? true : d.area === selectedArea;
                    return matchApt && matchArea;
                });

                document.getElementById('sortContainer').classList.remove('hidden');
                sortData('date'); 
            } catch (e) {
                resultDiv.innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-xl text-center font-bold text-xs">서버 연결 실패. GAS 배포 설정을 확인하세요.</div>`;
            } finally {
                btn.disabled = false; btn.innerText = "조회하기";
            }
        }

        function sortData(type) {
            const dateBtn = document.getElementById('sortDateBtn');
            const priceBtn = document.getElementById('sortPriceBtn');
            if (type === 'date') {
                currentData.sort((a, b) => new Date(b.date) - new Date(a.date));
                dateBtn.className = "flex-1 py-2 rounded-lg text-[11px] font-bold bg-blue-600 text-white shadow-sm";
                priceBtn.className = "flex-1 py-2 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-600 border border-slate-200 shadow-sm";
            } else {
                currentData.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
                priceBtn.className = "flex-1 py-2 rounded-lg text-[11px] font-bold bg-blue-600 text-white shadow-sm";
                dateBtn.className = "flex-1 py-2 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-600 border border-slate-200 shadow-sm";
            }
            renderData(currentData);
        }

        function renderData(data) {
            const resultDiv = document.getElementById('resultList');
            if (data.length === 0) { resultDiv.innerHTML = '<p class="text-center py-10 text-gray-400">데이터가 없습니다.</p>'; return; }
            let html = `<p class="text-[10px] text-gray-400 mb-2 font-bold">총 ${data.length}건 발견</p>`;
            data.forEach(d => {
                const ratio = ((parseFloat(d.price) / parseFloat(d.prevMax)) * 100).toFixed(1);
                const ratioColor = ratio >= 100 ? 'text-red-500 font-bold' : (ratio >= 95 ? 'text-orange-500' : 'text-gray-400');
                const maxTag = d.isMax ? `<span class="bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded ml-2 border border-amber-300 animate-bounce">👑 역대 신고가</span>` : '';
                html += `
                <div class="bg-white border rounded-2xl p-4 shadow-sm mb-3">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center"><h3 class="font-bold text-slate-800 text-base">${d.aptNm}</h3>${maxTag}</div>
                        <span class="text-slate-400 text-[10px] font-bold">${d.date}</span>
                    </div>
                    <div class="flex justify-between mt-4 items-end">
                        <div class="text-xs text-gray-400 font-medium">${d.area} / ${d.floor}층</div>
                        <div class="text-right">
                            <div class="text-[10px] text-gray-400 mb-1">직전 최고: ${d.prevMax} (${d.prevDate}) <span class="${ratioColor}">[${ratio}%]</span></div>
                            <div class="text-xl font-extrabold text-blue-600 tracking-tight">${d.price}</div>
                        </div>
                    </div>
                </div>`;
            });
            resultDiv.innerHTML = html;
        }
    </script>
</body>
</html>
