<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일직동 실거래가 알림이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        /* 날짜 입력창이 모바일에서 안 보이지 않도록 강제 스타일 부여 */
        input[type="month"] {
            -webkit-appearance: none;
            min-height: 3rem;
            color: #1e293b !important; /* 짙은 색상 강제 */
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div class="max-w-lg mx-auto bg-white min-h-screen shadow-lg">
        <div class="bg-slate-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold italic">광명역 아파트 실거래가</h1>
            <p class="text-slate-400 text-sm mt-1 font-bold">조회기간과 단지 및 면적을 선택한 후 조회를 누르세요</p>
        </div>

        <div class="p-4 space-y-3 border-b sticky top-0 bg-white z-20 shadow-sm">
            <div class="grid grid-cols-2 gap-2">
                <div class="flex flex-col">
                    <label class="text-[10px] text-slate-400 ml-1 mb-1 font-bold">시작월</label>
                    <input type="month" id="startYm" class="p-3 border-2 border-slate-200 rounded-xl text-sm bg-white font-bold">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] text-slate-400 ml-1 mb-1 font-bold">종료월</label>
                    <input type="month" id="endYm" class="p-3 border-2 border-slate-200 rounded-xl text-sm bg-white font-bold">
                </div>
            </div>

            <select id="selectedApt" class="w-full p-3 border-2 border-slate-100 rounded-xl text-sm bg-gray-50 font-medium">
                <option value="전체 단지">전체 단지</option>
                <option value="광명역써밋플레이스">광명역써밋플레이스</option>
                <option value="유-플래닛태영데시앙">유-플래닛태영데시앙</option>
                <option value="광명역푸르지오">광명역푸르지오</option>
                <option value="광명역파크자이">광명역파크자이</option>
                <option value="광명역센트럴자이">광명역센트럴자이</option>
            </select>

            <select id="selectedArea" class="w-full p-3 border-2 border-slate-100 rounded-xl text-sm bg-gray-50 font-medium">
                <option value="전체 면적">전체 면적</option>
                <option value="59형(26평)">59형(26평)</option>
                <option value="84형(34평)">84형(34평)</option>
            </select>

            <button onclick="fetchAllData()" id="btnFetch" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold active:bg-blue-800 transition-all shadow-lg text-lg">
                조회하기
            </button>
        </div>

        <div id="resultList" class="p-4 space-y-3">
            <div class="text-center text-gray-400 mt-20">
                <p>구글 서버 연결 상태를 확인 중입니다...</p>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 주의: GAS_URL 끝에 /exec 가 있는지 꼭 확인하세요!
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyjZIkJA0mbMDH3AKrocAmwSAOsoAwajuU-5ItPoADNk1DHzHAuHCajIltNP0GZle0Tyw/exec";

        window.onload = function() {
            const now = new Date();
            now.setMonth(now.getMonth() - 1);
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const lastMonth = `${year}-${month}`;
            document.getElementById('startYm').value = lastMonth;
            document.getElementById('endYm').value = lastMonth;
        };

        async function fetchAllData() {
            const startYm = document.getElementById('startYm').value.replace("-", "");
            const endYm = document.getElementById('endYm').value.replace("-", "");
            const selectedApt = document.getElementById('selectedApt').value;
            const selectedArea = document.getElementById('selectedArea').value;
            const resultDiv = document.getElementById('resultList');
            const btn = document.getElementById('btnFetch');

            btn.disabled = true;
            btn.innerText = "서버 연결 중...";
            resultDiv.innerHTML = '<div class="text-center py-10"><p class="animate-bounce">🚀 구글 서버 응답 대기 중...</p></div>';

            try {
                const response = await fetch(`${GAS_URL}?startYm=${startYm}&endYm=${endYm}`);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();

                const filteredData = data.filter(d => {
                    const matchApt = selectedApt === "전체 단지" ? true : d.aptNm === selectedApt;
                    const matchArea = selectedArea === "전체 면적" ? true : d.area === selectedArea;
                    return matchApt && matchArea;
                });

                renderData(filteredData);
            } catch (e) {
                resultDiv.innerHTML = `
                    <div class="p-6 bg-red-50 text-red-600 rounded-2xl text-sm border border-red-100">
                        <p class="font-bold text-base mb-2 text-center">⚠️ 서버 연결 실패</p>
                        <ul class="list-disc ml-4 space-y-1">
                            <li>GAS 배포시 <b>'액세스 권한: 모든 사용자'</b>로 설정했나요?</li>
                            <li>GAS 코드를 수정 후 <b>'새 버전'</b>으로 배포했나요?</li>
                            <li>인터넷 연결 혹은 구글 서버 일시 오류일 수 있습니다.</li>
                        </ul>
                        <p class="mt-4 text-[10px] opacity-70">Error: ${e.message}</p>
                    </div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "조회하기";
            }
        }

        function renderData(data) {
            const resultDiv = document.getElementById('resultList');
            if (!data || data.length === 0) {
                resultDiv.innerHTML = '<p class="text-center py-10 text-gray-400">해당 조건의 실거래 정보가 없습니다.</p>';
                return;
            }

            let html = `<p class="text-[10px] text-gray-400 mb-1 font-bold">총 ${data.length}건 발견</p>`;
            data.forEach(d => {
                const maxTag = d.isMax ? `<span class="bg-amber-100 text-amber-700 text-[10px] px-2 py-1 rounded-md font-bold ml-2 border border-amber-300">👑 역대 신고가</span>` : '';
                
                const currentPrice = parseFloat(d.price.replace('억', ''));
                const prevMaxPrice = parseFloat(d.prevMax.replace('억', ''));
                let percentHtml = '';

                if (prevMaxPrice > 0) {
                    const ratio = ((currentPrice / prevMaxPrice) * 100).toFixed(1);
                    let colorClass = 'text-gray-400';
                    if (ratio >= 100) colorClass = 'text-red-500 font-bold';
                    else if (ratio >= 95) colorClass = 'text-orange-500';
                    percentHtml = `<span class="${colorClass} ml-1">[${ratio}%]</span>`;
                }

                html += `
                <div class="bg-white border-2 border-slate-50 rounded-2xl p-4 shadow-sm mb-3 active:scale-[0.98] transition-transform">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center">
                            <h3 class="font-bold text-slate-800 text-base">${d.aptNm}</h3>
                            ${maxTag}
                        </div>
                        <span class="bg-slate-100 text-slate-500 text-[10px] px-2 py-1 rounded-md font-bold">${d.date}</span>
                    </div>
                    <div class="flex justify-between mt-4 items-end">
                        <div class="text-xs text-gray-400 font-medium">${d.area} / ${d.floor}층</div>
                        <div class="text-right">
                            <div class="text-[10px] text-gray-400 mb-1">직전 최고: ${d.prevMax} ${percentHtml}</div>
                            <div class="text-xl font-extrabold text-blue-600 tracking-tight">${d.price}</div>
                        </div>
                    </div>
                </div>`;
            });
            resultDiv.innerHTML = html;
        }
    </script>
</body>
</html>
