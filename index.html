<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일직동 실거래가 알림이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen pb-10">

    <div class="max-w-lg mx-auto bg-slate-900 min-h-screen shadow-2xl flex flex-col border-x border-slate-800">
        <div class="bg-slate-950 p-6 text-white text-center border-b border-slate-800">
            <h1 class="text-2xl font-bold italic text-slate-100">광명역 아파트 실거래가</h1>
            <p class="text-slate-400 text-sm mt-1 font-bold">조회기간과 단지 및 면적을 선택해주세요</p>
        </div>

        <div class="p-4 space-y-3 border-b border-slate-800 bg-slate-900">
            <div class="grid grid-cols-2 gap-2">
                <input type="month" id="startYm" class="p-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-200 color-scheme-dark">
                <input type="month" id="endYm" class="p-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-200 color-scheme-dark">
            </div>
            <select id="selectedApt" class="w-full p-2 border border-slate-700 rounded-lg text-sm bg-slate-800 text-slate-200 focus:outline-none">
                <option value="전체 단지">전체 단지</option>
                <option value="광명역써밋플레이스">광명역써밋플레이스</option>
                <option value="유-플래닛태영데시앙">유-플래닛태영데시앙</option>
                <option value="광명역푸르지오">광명역푸르지오</option>
                <option value="광명역파크자이">광명역파크자이</option>
                <option value="광명역센트럴자이">광명역센트럴자이</option>
            </select>
            <select id="selectedArea" class="w-full p-2 border border-slate-700 rounded-lg text-sm bg-slate-800 text-slate-200 focus:outline-none">
                <option value="전체 면적">전체 면적</option>
                <option value="59형(26평)">59형(26평)</option>
                <option value="84형(34평)">84형(34평)</option>
            </select>
            <button onclick="fetchAllData()" id="btnFetch" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold active:bg-blue-800 transition-colors shadow-md">
                조회하기
            </button>
        </div>

        <div id="sortControls" class="hidden sticky top-0 px-4 py-2.5 bg-slate-950 flex gap-2 border-b border-slate-800 z-30 shadow-md">
            <button onclick="sortData('date')" id="sortDateBtn" class="flex-1 py-2 text-xs font-bold rounded-lg bg-blue-600/20 border border-blue-500 text-blue-400 shadow-sm">
                📅 거래일자순
            </button>
            <button onclick="sortData('price')" id="sortPriceBtn" class="flex-1 py-2 text-xs font-bold rounded-lg bg-slate-800 border border-slate-700 text-slate-400 shadow-sm">
                💰 거래액순
            </button>
        </div>

        <div id="resultList" class="p-4 space-y-3 flex-1">
            <div class="text-center text-slate-500 mt-20">
                <p> 국토교통부 실거래가를 안전하게 불러옵니다.</p>
            </div>
        </div>
    </div>

    <style>
        .color-scheme-dark { color-scheme: dark; }
    </style>

    <script>
        // ★중요: 새 구글 계정의 새 배포 Web App URL을 여기에 붙여넣으세요
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzhyRumrfeS7sZ6Gs3UD8kMFn0hzrz0Csae4wSgdDEtEnsRjDOZJb0olZiBh1322QKj/exec";

        let currentData = []; 

        window.onload = function() {
            const now = new Date();
            now.setMonth(now.getMonth() - 1);
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const lastMonth = `${year}-${month}`;
            document.getElementById('startYm').value = lastMonth;
            document.getElementById('endYm').value = lastMonth;
        };

        async function fetchAllData() {
            const startYm = document.getElementById('startYm').value.replace("-", "");
            const endYm = document.getElementById('endYm').value.replace("-", "");
            const selectedApt = document.getElementById('selectedApt').value;
            const selectedArea = document.getElementById('selectedArea').value;
            const resultDiv = document.getElementById('resultList');
            const btn = document.getElementById('btnFetch');
            const sortDiv = document.getElementById('sortControls');

            btn.disabled = true;
            btn.innerText = "조회 중...";
            resultDiv.innerHTML = '<div class="text-center py-10"><p class="animate-bounce text-slate-400">🚀 데이터를 가져오는 중...</p></div>';
            sortDiv.classList.add('hidden');

            try {
                const response = await fetch(`${GAS_URL}?startYm=${startYm}&endYm=${endYm}`);
                const data = await response.json();

                currentData = data.filter(d => {
                    const matchApt = selectedApt === "전체 단지" ? true : d.aptNm.includes(selectedApt.replace("광명역","").replace("유-플래닛","").replace("태영","").trim());
                    const matchArea = selectedArea === "전체 면적" ? true : d.area === selectedArea;
                    return matchApt && matchArea;
                });

                sortDiv.classList.remove('hidden');
                sortData('date'); 
            } catch (e) {
                console.error(e);
                resultDiv.innerHTML = `<div class="p-4 bg-red-950/50 border border-red-900 text-red-400 rounded-lg text-sm text-center font-bold">서버 연결 실패</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "조ня하기";
            }
        }

        function sortData(type) {
            const dateBtn = document.getElementById('sortDateBtn');
            const priceBtn = document.getElementById('sortPriceBtn');

            if (type === 'date') {
                currentData.sort((a, b) => new Date(b.date) - new Date(a.date));
                dateBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-blue-600/20 border border-blue-500 text-blue-400 shadow-sm";
                priceBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-slate-800 border border-slate-700 text-slate-400 shadow-sm";
            } else {
                currentData.sort((a, b) => parseFloat(b.price.replace("억", "")) - parseFloat(a.price.replace("억", "")));
                priceBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-blue-600/20 border border-blue-500 text-blue-400 shadow-sm";
                dateBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-slate-800 border border-slate-700 text-slate-400 shadow-sm";
            }
            renderData(currentData);
        }

        function renderData(data) {
            const resultDiv = document.getElementById('resultList');
            if (!data || data.length === 0) {
                resultDiv.innerHTML = '<p class="text-center py-10 text-slate-500">조건에 맞는 데이터가 없습니다.</p>';
                return;
            }

            let html = `<p class="text-xs text-slate-400 mb-2 font-bold px-1">총 ${data.length}건의 거래 발견</p>`;
            
            data.forEach(d => {
                const currentPrice = parseFloat(d.price.replace("억", ""));
                const previousMax = parseFloat(d.prevMax.replace("억", ""));
                
                let ratioText = "직전 정보 없음";
                let ratioColor = "text-slate-400 bg-slate-800";
                
                if (previousMax > 0) {
                    const ratio = ((currentPrice / previousMax) * 100).toFixed(1);
                    const diff = (currentPrice - previousMax).toFixed(2);
                    const diffText = diff > 0 ? `+${diff}억` : (diff < 0 ? `${diff}억` : "보합");
                    ratioText = `${ratio}% (${diffText})`;
                    if (currentPrice > previousMax) ratioColor = "text-red-400 bg-red-950/60 font-bold border border-red-900/40";
                    else if (currentPrice < previousMax) ratioColor = "text-blue-400 bg-blue-950/60 font-bold border border-blue-900/40";
                }

                const maxBadge = d.isMax ? `<span class="bg-red-600 text-white text-[9px] px-1.5 py-0.5 rounded ml-1.5 font-bold animate-pulse">신고가</span>` : '';
                const cardStyle = d.isMax ? 'border-red-300 bg-slate-900 shadow-lg' : 'border-slate-800 bg-slate-950 shadow-sm';

                const formattedPrevDate = (d.prevDate && d.prevDate.length >= 10) ? d.prevDate.substring(2) : d.prevDate;
                
                // 등록일 포맷팅 두자리 축소 (2024-05-10 -> 24-05-10)
                const formattedRegDate = (d.regDate && d.regDate.length >= 10) ? d.regDate.substring(2) : d.regDate;

                html += `
                <div class="${cardStyle} border rounded-xl p-3 mb-2 text-sm transition-all">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center min-w-0 flex-1 mr-2">
                            <h3 class="font-extrabold text-slate-200 text-sm truncate tracking-tight">${d.aptNm}</h3>
                            ${maxBadge}
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0">
                            <span class="text-slate-400 text-xs">${d.area.split('형')[0]}형 / ${d.floor}층</span>
                            <span class="text-lg font-black text-white tracking-tighter">${d.price}</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mt-1.5 pt-1.5 border-t border-slate-800 text-[11px]">
                        <div class="text-slate-500 flex flex-col gap-0.5">
                            <div class="flex items-center">
                                <span class="text-slate-600 mr-1">계약</span> ${d.date.substring(2)}
                            </div>
                            <div class="flex items-center text-slate-600">
                                <span class="mr-1">등기</span> <span class="${formattedRegDate !== '-' ? 'text-slate-400' : 'text-slate-600'}">${formattedRegDate}</span>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-1.5 self-end">
                            <span class="text-slate-500">직전 최고 <span class="text-slate-300 font-medium">${d.prevMax}</span> <span class="text-[10px] text-slate-600">(${formattedPrevDate})</span></span>
                            <span class="px-1.5 py-0.5 rounded text-[10px] ${ratioColor}">${ratioText}</span>
                        </div>
                    </div>
                </div>`;
            });
            resultDiv.innerHTML = html;
        }
    </script>
</body>
</html>
